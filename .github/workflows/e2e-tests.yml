name: E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    # Job-level environment variables (available to all steps)
    env:
      # E2E_SEED_SECRET enables the test-only POST /test/seed endpoint on the
      # local cf-worker. Set as a GitHub Actions secret on the repo.
      E2E_SEED_SECRET: ${{ secrets.E2E_SEED_SECRET }}
      # Note: REACT_APP_API_BASE_URL is intentionally NOT set at job level any
      # more. Playwright's webServer config sets it per-process to point at the
      # local cf-worker (http://localhost:8787) when E2E_BACKEND_URL is unset.

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install --immutable

    - name: Install Playwright Browsers and System Dependencies
      run: yarn test:e2e:install

    - name: Build the application
      run: yarn build

    - name: Reset local D1 state (fresh per CI run)
      run: rm -rf cf-worker/.wrangler/state/v3/d1

    - name: Run E2E tests
      run: yarn playwright test --project=chromium --workers=1 --reporter=list,html --trace=on
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7
    
    - name: Upload screenshots
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: playwright-screenshots
        path: test-results/
        retention-days: 7 