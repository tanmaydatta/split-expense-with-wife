name: E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    # Job-level environment variables (available to all steps)
    env:
      # CI runs e2e against the deployed dev cf-worker (same as before this
      # branch). The fixture infrastructure on this branch supports a local
      # backend for local development (yarn test:e2e:fresh), but CI keeps using
      # remote until the pilot conversion is debugged in a follow-up PR.
      # Tests that depend on /test/seed auto-skip when running against remote
      # via skipIfRemoteBackend().
      E2E_BACKEND_URL: https://splitexpense-dev.tanmaydatta.workers.dev
      PLAYWRIGHT_BASE_URL: https://splitexpense-dev.tanmaydatta.workers.dev
      REACT_APP_API_BASE_URL: ${{ vars.REACT_APP_API_BASE_URL }}
      REACT_APP_AUTH_BASE_URL: ${{ vars.REACT_APP_AUTH_BASE_URL }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install --immutable

    - name: Install Playwright Browsers and System Dependencies
      run: yarn test:e2e:install

    - name: Build the application
      run: yarn build

    - name: Run E2E tests
      run: yarn playwright test --project=chromium --workers=1 --reporter=list,html --trace=on  src/e2e/tests/scheduled-actions.spec.ts && yarn playwright test --project=chromium --workers=1 --reporter=list,html --trace=on  src/e2e/tests/settings-management.spec.ts && yarn playwright test --project=chromium --workers=1 --reporter=list,html --trace=on src/e2e/tests/budget-management.spec.ts && yarn playwright test --project=chromium --workers=1 --reporter=list,html --trace=on src/e2e/tests/transactions-balances.spec.ts && yarn playwright test --project=chromium --workers=1 --reporter=list,html --trace=on src/e2e/tests/expense-management.spec.ts && yarn playwright test --project=chromium --workers=1 --reporter=list,html --trace=on src/e2e/tests/auth.spec.ts
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7
    
    - name: Upload screenshots
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: playwright-screenshots
        path: test-results/
        retention-days: 7 