name: E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    # Job-level environment variables (available to all steps)
    env:
      REACT_APP_API_BASE_URL: ${{ vars.REACT_APP_API_BASE_URL }}
      REACT_APP_AUTH_BASE_URL: ${{ vars.REACT_APP_AUTH_BASE_URL }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install --immutable

    - name: Install Playwright Browsers and System Dependencies
      run: yarn test:e2e:install

    - name: Build the application
      run: yarn build

    # ===== Pilot spec against LOCAL cf-worker (new fixtures flow) =====
    # Run local first to fail fast on fixture/seed issues before paying the
    # cost of the remote-backend run. Playwright's webServer config boots both
    # the React frontend and a local `wrangler dev` instance. The pilot uses
    # the /test/seed endpoint to populate the local D1 per test.
    - name: Setup local backend for pilot
      env:
        E2E_SEED_SECRET: ${{ secrets.E2E_SEED_SECRET }}
      run: |
        if [ -z "$E2E_SEED_SECRET" ]; then
          echo "::error::E2E_SEED_SECRET secret is not set on this repo. Add it under Settings → Secrets and variables → Actions (any opaque value)."
          exit 1
        fi
        # Use printf to avoid echo's escape interpretation. The secret must
        # not contain trailing whitespace/newline; wrangler's .dev.vars parser
        # treats the rest of the line as the value, but the test process's
        # process.env retains them — causing a header/env mismatch.
        printf 'E2E_SEED_SECRET=%s\n' "$E2E_SEED_SECRET" > cf-worker/.dev.vars
        rm -rf cf-worker/.wrangler/state/v3/d1
        cd cf-worker && yarn db:migrate:local

    - name: Run pilot e2e tests against local backend
      env:
        E2E_SEED_SECRET: ${{ secrets.E2E_SEED_SECRET }}
        # E2E_BACKEND_URL intentionally NOT set here so it remains undefined,
        # letting playwright config + seed-client default to local
        # (http://localhost:8787). Job-level env doesn't set it either.
        PLAYWRIGHT_BASE_URL: http://localhost:3000
      run: yarn playwright test --project=chromium --workers=1 --reporter=list,html --trace=on src/e2e/tests/expense-management.spec.ts && yarn playwright test --project=chromium --workers=1 --reporter=list,html --trace=on src/e2e/tests/scheduled-actions.spec.ts && yarn playwright test --project=chromium --workers=1 --reporter=list,html --trace=on src/e2e/tests/monthly-budget-management.spec.ts

    # ===== Legacy specs against remote dev cf-worker (existing flow) =====
    # These spec files use UI-based login with hardcoded test users that exist
    # in the deployed dev D1. Convert to fixtures incrementally and move them
    # to the local-backend step above.
    - name: Run e2e tests against remote (legacy specs)
      env:
        E2E_BACKEND_URL: https://splitexpense-dev.tanmaydatta.workers.dev
        PLAYWRIGHT_BASE_URL: https://splitexpense-dev.tanmaydatta.workers.dev
      run: yarn playwright test --project=chromium --workers=1 --reporter=list,html --trace=on  src/e2e/tests/settings-management.spec.ts && yarn playwright test --project=chromium --workers=1 --reporter=list,html --trace=on src/e2e/tests/budget-management.spec.ts && yarn playwright test --project=chromium --workers=1 --reporter=list,html --trace=on src/e2e/tests/transactions-balances.spec.ts && yarn playwright test --project=chromium --workers=1 --reporter=list,html --trace=on src/e2e/tests/auth.spec.ts
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7
    
    - name: Upload screenshots
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: playwright-screenshots
        path: test-results/
        retention-days: 7 